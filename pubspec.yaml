name: ledger
description: "The record your community keeps forever."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  firebase_messaging: ^15.2.4
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  share_plus: ^10.1.4
  pdf: ^3.11.2
  printing: ^5.13.4
  intl: ^0.20.2
  path_provider: ^2.1.5
  csv: ^6.0.0
  permission_handler: ^11.3.1
  flutter_local_notifications: ^18.0.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  uuid: ^4.5.1
  flutter_svg: ^2.0.17
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/true.png"
  adaptive_icon_background: "#10B981"
  adaptive_icon_foreground: "assets/icons/true.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
